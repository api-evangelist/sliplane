apis:
  - aid: sliplane:control-api
    name: Sliplane Control API
    description: >-
      The Sliplane Control API is a REST API at https://ctrl.sliplane.io/v0
      for programmatically managing organizations, projects, services,
      deployments, custom domains, registry credentials, servers, volumes,
      events, logs, metrics, and OAuth clients on the Sliplane platform.
      Authentication is via Bearer token using either organization-scoped API
      keys (api_rw_org_xxx_secret / api_ro_org_xxx_secret) created in team
      settings, or OAuth 2.0 client credentials.
    humanURL: https://docs.sliplane.io/api/getting-started
    baseURL: https://ctrl.sliplane.io/v0
    tags:
      - Container Hosting
      - Docker
      - Deployments
      - Projects
      - Services
      - Domains
      - Volumes
      - Logs
      - Metrics
      - OAuth
    properties:
      - type: Documentation
        url: https://docs.sliplane.io/api/getting-started
      - type: InteractiveDocumentation
        url: https://ctrl.sliplane.io
      - type: Authentication
        url: https://docs.sliplane.io/api/getting-started
      - type: SignUp
        url: https://sliplane.io/signup
  - aid: sliplane:mcp
    name: Sliplane MCP Server
    description: >-
      The Sliplane MCP server exposes the Sliplane Control API as Model
      Context Protocol tools so AI assistants (Claude, Cursor, VS Code) can
      manage deployments, projects, services, and infrastructure on a user's
      behalf. The hosted endpoint at https://mcp.sliplane.io uses SSE
      transport with an Authorization Bearer header carrying a Sliplane API
      key. A reference Python implementation is published under the
      sliplane/mcp GitHub repository and can also be self-hosted via uv or
      Docker.
    humanURL: https://docs.sliplane.io/mcp/getting-started
    baseURL: https://mcp.sliplane.io
    tags:
      - MCP
      - Model Context Protocol
      - AI Agents
      - Deployments
      - Docker
    properties:
      - type: Documentation
        url: https://docs.sliplane.io/mcp/getting-started
      - type: SourceCode
        url: https://github.com/sliplane/mcp
      - type: Authentication
        url: https://docs.sliplane.io/mcp/getting-started
