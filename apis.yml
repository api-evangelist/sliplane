aid: sliplane
name: Sliplane
description: >-
  Sliplane is a Germany-based Container-as-a-Service (CaaS) platform that lets
  developers build, run, and monitor Dockerized applications in the cloud with
  simple, transparent, hourly server pricing and unlimited services per server.
  The platform positions itself as a European alternative to Heroku, Render,
  Fly.io, and Railway, offering push-to-deploy from GitHub, one-click
  deployment of 400k+ Docker Hub images, environment variable and secret
  management, free SSL certificates, custom domains, daily volume backups,
  private networking via Twingate, SSH access, health checks, log streaming,
  and service metrics. Servers are available in Germany, Finland, US East, US
  West, and Singapore, with five tier sizes ranging from a 2 vCPU / 2 GB Base
  server at roughly EUR 9/month to a 16 vCPU / 32 GB XX-Large server at
  roughly EUR 224/month. Sliplane exposes a public REST API at
  ctrl.sliplane.io/v0 covering identity, projects, services, deployments,
  domains, events, logs, metrics, pause/unpause, registry credentials,
  servers, volumes, and OAuth clients, with both API key (api_rw_/api_ro_)
  and OAuth authentication. Sliplane also operates a hosted Model Context
  Protocol (MCP) server at mcp.sliplane.io that mirrors the public API for
  AI-assistant-driven deployment management, alongside a Python MCP reference
  implementation, a Go SDK for the underlying DataPacket infrastructure, a
  reverse-proxy image, a Postgres-SSL image, an Open WebUI theme, and
  numerous Dockerized application boilerplates published under the sliplane
  GitHub organization.
